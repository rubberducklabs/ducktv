services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    ports:
      - "4000:4000"
    # OrbStack/Cursor sometimes leaves the app off the Compose DNS network, so
    # service name "db" NXDOMAINs. Publish Postgres on the host and map "db"
    # to the host gateway so the hostname still works inside the app container.
    extra_hosts:
      - "db:host-gateway"
      - "host.docker.internal:host-gateway"
    environment:
      MIX_ENV: dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_DB: tvplayer_dev
      DATABASE_URL: ecto://postgres:postgres@db/tvplayer_dev
      TVHEADEND_URL: ${TVHEADEND_URL:-http://10.0.1.10:9981}
      TVHEADEND_USER: ${TVHEADEND_USER:-admin}
      TVHEADEND_PASSWORD: ${TVHEADEND_PASSWORD:-admin}
      HLS_ROOT: /workspace/tmp/hls
      HOT_CHANNELS: ${HOT_CHANNELS:-1}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tvplayer_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
